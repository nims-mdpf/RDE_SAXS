[tox]
skipsdist = True
envlist =
    py3{12}-{module,pyrefly,ruff}
skip_missing_interpreters = True

[testenv:py312-module]
deps = -rrequirements-test.txt
commands =
    python3 -m pytest --cov-config=pyproject.toml --cov=. --cov-report=html --cov-report=xml --cov-report=term-missing tests

[testenv:py312-pyrefly]
skip_install = true
deps = -rrequirements-test.txt
commands =
  pyrefly check main.py modules_saxs

[testenv:py312-ruff]
skip_install = true
deps = -rrequirements-test.txt
commands =
  ruff check main.py modules_saxs
